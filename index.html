<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
    <header>
        <h1>Rock Paper Scissors</h1>
    </header>

    <main>
        <h2 class="status"">Choose Your Strike!</h2>
        <p class="win-condition-text">First to win 5 rounds wins the battle </p>
        
        <div class="scores-box">
            <p class="score">Player: <span id="player-score">0</span></p>
            <p class="score">Computer: <span id="computer-score">0</span></p>
    
        </div>

        <div class="choices-box">
            <button class="choice-btn" id="rock">✊</button>
            <button  class="choice-btn" id="paper">✋</button>
            <button class="choice-btn" id="scissors">✌️</button>
            <audio id="hover-sound" src="assets/hoverSound.mp3"></audio>
            <audio id="click-sound" src="assets/clickSound.mp3"></audio>
        </div>
        <dialog aria-hidden="true" hidden class="result-dialog">
            <button class="reset-btn">Play Again!</button>
        </dialog>
    </main>
    <script src="script.js"></script>
</body>
</html>
